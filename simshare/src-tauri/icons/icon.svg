<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C6CF0"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Two curved sync arrows forming a cycle -->
  <g fill="none" stroke="white" stroke-width="36" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top arc: left to right -->
    <path d="M176,216 C176,148 256,120 336,168"/>
    <!-- Bottom arc: right to left -->
    <path d="M336,296 C336,364 256,392 176,344"/>
  </g>

  <!-- Arrowheads -->
  <g fill="white">
    <!-- Top arrow tip (pointing right-down) -->
    <polygon points="324,132 368,176 312,184"/>
    <!-- Bottom arrow tip (pointing left-up) -->
    <polygon points="188,380 144,336 200,328"/>
  </g>
</svg>
